<!DOCTYPE html>
<html>
<head>
    <title>Emergency Alerts</title>
    <link rel="stylesheet" href="/static/style.css">

    <script>
        function confirmDelete(id) {
            let confirmAction = confirm("⚠️ Are you sure you want to delete this alert?");
            if (confirmAction) {
                window.location.href = "/delete_alert/" + id;
            }
        }
    </script>

</head>

<body>

<div class="container">

    <h2>🚨 Emergency Alerts</h2>

    <!-- ALERT LIST -->
    {% if alerts %}
        <ul>
            {% for alert in alerts %}
                <li>
                    {{alert[1]}}

                    - <a href="#" onclick="confirmDelete({{alert[0]}})" style="color:red;">
                        ❌ Delete
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No alerts currently</p>
    {% endif %}

    <!-- ADD ALERT -->
    <h3>➕ Add Alert</h3>
    <form action="/add_alert" method="post">
        <input type="text" name="message" placeholder="Enter alert" required><br><br>
        <button type="submit">Add Alert</button>
    </form>

    <br>
    <a href="/dashboard">⬅ Back</a>

</div>

</body>
</html>
