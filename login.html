<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- 🌍 Language Selector -->
    <form method="get">
        <select name="lang" onchange="this.form.submit()">
            <option value="en">English</option>
            <option value="te">తెలుగు</option>
            <option value="hi">हिंदी</option>
        </select>
    </form>

    <h2>Login</h2>

    <form action="/login" method="post">
        <input type="email" name="email" placeholder="{{text.email}}" required><br>
        <input type="password" name="password" placeholder="{{text.password}}" required><br>

        <button type="submit">{{text.login}}</button>
    </form>

    <br>
    <a href="/register_page?lang={{lang}}">New user? Register here</a>

</div>

</body>
</html>
