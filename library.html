<!DOCTYPE html>
<html>
<head>
    <title>Digital Library</title>
    <link rel="stylesheet" href="/static/style.css">

    <script>
        function confirmDelete(id) {
            let confirmAction = confirm("⚠️ Are you sure you want to delete this book?");
            if (confirmAction) {
                window.location.href = "/delete_book/" + id;
            }
        }
    </script>

</head>

<body>

<div class="container">

    <h2>📖 Digital Library</h2>

    <!-- 📚 BOOK LIST -->
    <h3>📚 Available Books</h3>

    {% if books %}
        <ul>
            {% for book in books %}
                <li>
                    <b>{{book[1]}}</b>

                    {% if book[2] %}
                        - <a href="/uploads/{{book[2]}}" target="_blank">📄 View</a>
                    {% endif %}

                    - <a href="#" onclick="confirmDelete({{book[0]}})" style="color:red;">
                        ❌ Delete
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No books available</p>
    {% endif %}

    <!-- ➕ ADD BOOK -->
    <h3>➕ Add Book</h3>

    <form action="/add_book" method="post" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Enter Book Title" required><br><br>
        <input type="file" name="file" required><br><br>
        <button type="submit">Upload</button>
    </form>

    <br>
    <a href="/dashboard">⬅ Back</a>

</div>

</body>
</html>
